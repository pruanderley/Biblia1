name: Build APK JFA Biblia

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Adicionar plataforma Android
        run: |
          rm -rf android
          npx cap add android

      - name: Injetar TTS nativo no MainActivity
        run: |
          cp patches/MainActivity.java \
             android/app/src/main/java/br/com/jfabiblia/offline/MainActivity.java
      - name: Gerar ícone do app
        run: npx @capacitor/assets generate --android
      - name: Sincronizar arquivos web
        run: npx cap sync android

      - name: Compilar APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: JFA-Biblia-Offline-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
